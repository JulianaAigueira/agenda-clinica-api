{% extends 'base.html' %}
{% block content %}
<div class="row">
    <div class="col-md-12 text-center mb-5">
        <h1 class="display-4 fw-bold text-custom">Nossos Serviços</h1>
        <p class="lead text-muted">Escolha o cuidado que você merece com a agilidade que você precisa.</p>
    </div>
</div>
<div class="row">
    {% for procedure in procedures %}
    <div class="col-md-4 mb-4">
        <div class="card h-100 shadow-sm border-0 rounded-4">
            <div class="card-body p-4 text-center">
                <div class="mb-3 text-primary" style="font-size: 2rem;">✨</div>
                <h5 class="card-title fw-bold text-dark">{{ procedure.name }}</h5>
                <p class="card-text text-muted">Duração: <strong>{{ procedure.estimated_duration }}</strong> minutos</p>
                <a href="{% url 'agendar' procedure.id %}" class="btn btn-primary mt-3 px-4 rounded-pill">Agendar Agora</a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
