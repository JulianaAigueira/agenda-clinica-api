{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0 rounded-4 mt-4">
            <div class="card-body p-5">
                <h3 class="fw-bold text-custom mb-1">Agendar Procedimento</h3>
                <p class="text-muted mb-4">Você está agendando: <strong>{{ procedure.name }}</strong></p>

                <form action="#" method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="data_hora" class="form-label fw-bold">Data e Hora da Consulta</label>
                        <input type="datetime-local" class="form-control form-control-lg" id="data_hora" name="data_hora" required>
                    </div>

                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary btn-lg rounded-pill">Confirmar Agendamento</button>
                    </div>
                </form>

                <div class="text-center mt-3">
                    <a href="{% url 'index' %}" class="text-decoration-none text-muted">Voltar para serviços</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
