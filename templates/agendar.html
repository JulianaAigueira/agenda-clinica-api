{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0 rounded-4 mt-4">
            <div class="card-body p-5">
                <h3 class="fw-bold text-custom mb-1">Agendar Procedimento</h3>
                <p class="text-muted mb-4">Você está agendando: <strong>{{ procedure.name }}</strong></p>

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-4">
                        <label class="form-label fw-bold">Especialista</label>
                        <select name="specialist" class="form-select" required>
                            <option value="">Selecione um profissional...</option>
                            {% for esp in especialistas %}
                                <option value="{{ esp.id }}">{{ esp.get_full_name|default:esp.username }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Data e Hora da Consulta</label>
                        <input type="datetime-local" name="data_hora" class="form-control" required>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary rounded-pill">Confirmar Agendamento</button>
                    </div>
                </form>

                <div class="text-center mt-3">
                    <a href="{% url 'index' %}" class="text-decoration-none text-muted">Voltar para serviços</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
