{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow border-0 rounded-4 mt-5">
            <div class="card-body p-5">
                <h3 class="text-center fw-bold text-custom mb-4">Criar Nova Conta</h3>

                <form method="post">
                    {% csrf_token %}

                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label text-muted small">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}
                                <div class="text-danger small">{{ field.errors }}</div>
                            {% endif %}
                            {% if field.help_text %}
                                <div class="form-text small">{{ field.help_text }}</div>
                            {% endif %}
                        </div>
                    {% endfor %}

                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary rounded-pill">Finalizar Cadastro</button>
                    </div>
                </form>

                <div class="text-center mt-3">
                    <p class="small">Já tem uma conta? <a href="{% url 'login' %}" class="text-custom fw-bold text-decoration-none">Faça login aqui</a></p>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    input {
        display: block;
        width: 100%;
        padding: 0.375rem 0.75rem;
        font-size: 1rem;
        font-weight: 400;
        line-height: 1.5;
        color: #212529;
        background-color: #fff;
        border: 1px solid #ced4da;
        border-radius: 0.375rem;
    }
</style>
{% endblock %}
